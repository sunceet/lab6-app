services:
  redis:
    image: redis:7.0
    ports:
      - "6379:6379"

  order_service:
    build: ./order_service
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8080:8080"

  notification_service:
    build: ./notification_service
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8081:8080"
